---
- name: Create telemetry directories
  file:
    path: "{{ item }}"
    state: directory
    owner: telemetry
    group: telemetry
    mode: '0755'
  loop:
    - /home/telemetry
    - /var/lib/telemetry/data
    - /var/lib/telemetry/logs
    - /var/lib/telemetry/config
  tags: directories

- name: Generate telemetry configuration
  template:
    src: telemetry-config.env.j2
    dest: /var/lib/telemetry/config/telemetry.env
    owner: telemetry
    group: telemetry
    mode: '0600'
  tags: config

- name: Create systemd service file
  template:
    src: telemetry-streamer.service.j2
    dest: /etc/systemd/system/telemetry-streamer.service
    mode: '0644'
  notify: reload systemd
  tags: systemd

- name: Create startup script
  template:
    src: start-streamer.sh.j2
    dest: /var/lib/telemetry/start-streamer.sh
    owner: telemetry
    group: telemetry
    mode: '0755'
  tags: scripts

- name: Create CSV sample data if it doesn't exist
  copy:
    content: |
      timestamp,device_id,metric_name,metric_value,tags
      2024-04-24T10:00:00Z,device-001,cpu_usage,45.5,{"env":"prod"}
      2024-04-24T10:00:01Z,device-001,memory_usage,72.3,{"env":"prod"}
      2024-04-24T10:00:02Z,device-002,cpu_usage,23.1,{"env":"dev"}
      2024-04-24T10:00:03Z,device-002,memory_usage,55.8,{"env":"dev"}
    dest: /var/lib/telemetry/data/telemetry.csv
    owner: telemetry
    group: telemetry
    mode: '0644'
    force: no
  tags: data
