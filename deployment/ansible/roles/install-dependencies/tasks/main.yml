---
- name: Install system dependencies
  package:
    name:
      - curl
      - wget
      - git
      - build-essential
      - docker.io
    state: present
  tags: dependencies

- name: Install Go
  block:
    - name: Check if Go is installed
      stat:
        path: /usr/local/go/bin/go
      register: go_binary
    
    - name: Download Go 1.21
      get_url:
        url: https://go.dev/dl/go1.21.linux-amd64.tar.gz
        dest: /tmp/go1.21.linux-amd64.tar.gz
        checksum: sha256:434b893673edb5ff997f26db01635d4e0b46c5622b3e849103b37eed3ff1b41d
      when: not go_binary.stat.exists
    
    - name: Extract Go
      unarchive:
        src: /tmp/go1.21.linux-amd64.tar.gz
        dest: /usr/local
        remote_src: yes
        creates: /usr/local/go
      when: not go_binary.stat.exists
    
    - name: Add Go to PATH
      copy:
        content: |
          export PATH=$PATH:/usr/local/go/bin
        dest: /etc/profile.d/golang.sh
        mode: '0644'
      when: not go_binary.stat.exists
  tags: golang

- name: Enable and start Docker service
  service:
    name: docker
    state: started
    enabled: yes
  tags: docker

- name: Create telemetry user
  user:
    name: telemetry
    shell: /bin/bash
    home: /home/telemetry
    createhome: yes
    state: present
  tags: users

- name: Add telemetry user to docker group
  user:
    name: telemetry
    groups: docker
    append: yes
  tags: users
