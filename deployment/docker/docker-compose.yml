version: '3.8'

services:
  # Message Broker (from messagebroker project)
  broker1:
    image: messagebroker:latest
    container_name: mb-broker1
    environment:
      BROKER_ID: 1
      BROKER_HOST: broker1
      BROKER_PORT: 9092
      COORDINATOR_URL: http://etcd:2379
      DATA_DIR: /data/messagebroker
    ports:
      - "9092:9092"
    volumes:
      - broker1_data:/data/messagebroker
    networks:
      - telemetry_net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9092"]
      interval: 10s
      timeout: 5s
      retries: 3

  broker2:
    image: messagebroker:latest
    container_name: mb-broker2
    environment:
      BROKER_ID: 2
      BROKER_HOST: broker2
      BROKER_PORT: 9092
      COORDINATOR_URL: http://etcd:2379
      DATA_DIR: /data/messagebroker
    ports:
      - "9093:9092"
    volumes:
      - broker2_data:/data/messagebroker
    networks:
      - telemetry_net
    depends_on:
      - broker1

  broker3:
    image: messagebroker:latest
    container_name: mb-broker3
    environment:
      BROKER_ID: 3
      BROKER_HOST: broker3
      BROKER_PORT: 9092
      COORDINATOR_URL: http://etcd:2379
      DATA_DIR: /data/messagebroker
    ports:
      - "9094:9092"
    volumes:
      - broker3_data:/data/messagebroker
    networks:
      - telemetry_net
    depends_on:
      - broker1

  # etcd for coordination
  etcd:
    image: quay.io/coreos/etcd:v3.5.10
    container_name: etcd-server
    environment:
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_DATA_DIR: /var/lib/etcd
    ports:
      - "2379:2379"
    volumes:
      - etcd_data:/var/lib/etcd
    networks:
      - telemetry_net

  # Telemetry Streamer
  telemetry-streamer:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    container_name: telemetry-streamer
    environment:
      SERVICE_NAME: telemetry-streamer
      SERVICE_ID: 1
      LOG_LEVEL: info
      CSV_FILE_PATH: /data/telemetry.csv
      READ_SPEED: 100  # messages per second
      BROKER_ADDRESSES: broker1:9092
      TOPIC: telemetry
      REPLICATION_FACTOR: 3
      BATCH_SIZE: 50
      BATCH_TIMEOUT_MS: 1000
      COMPRESSION_TYPE: snappy
      ACKS: all
      MAX_RETRIES: 5
      RETRY_BACKOFF_MS: 100
      CIRCUIT_BREAKER_THRESHOLD: 10
      HEALTH_CHECK_INTERVAL: 30
      GRACEFUL_SHUTDOWN_TIMEOUT: 30
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data  # Mount CSV file here
    networks:
      - telemetry_net
    depends_on:
      - broker1
      - broker2
      - broker3
      - etcd
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  broker1_data:
    driver: local
  broker2_data:
    driver: local
  broker3_data:
    driver: local
  etcd_data:
    driver: local

networks:
  telemetry_net:
    driver: bridge
